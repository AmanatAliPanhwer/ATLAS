<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws://localhost:8000 http://localhost:8000 http://localhost:3000;" />
  <title>ATLAS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;600;700&family=Space+Mono&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link rel="stylesheet" href="./sphere.css" />
</head>

<body>

  <canvas id="canvas"></canvas>
  <div class="orb" id="orb1"></div>
  <div class="orb" id="orb2"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>
  <div class="think-ring" id="think-ring"></div>
  <div id="intake-ring"></div>
  <div id="eq-glow"></div>

  <div class="header">
    <div class="header-title">ATLAS</div>
    <div class="header-subtitle">A Truly Loyal Assistant System</div>
    <div class="header-rule"></div>
  </div>

  <div id="voice-bars">
    <div class="vbar" style="animation:vb-c 1.05s .00s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-a 1.05s .12s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-b  .85s .06s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-d  .95s .22s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-a 1.15s .35s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-e  .75s .18s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-b 1.00s .08s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-c  .90s .28s ease-in-out infinite"></div>
    <div class="vbar" style="animation:vb-d 1.10s .15s ease-in-out infinite"></div>
  </div>

  <div class="chat-container">
    <div class="chat-label">CONVERSATION LOG</div>
    <div id="chat-history"></div>
  </div>

  <div class="footer-controls">
    <div class="input-pill">
      <div class="media-btn" id="cam-btn" title="Toggle Camera">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
      </div>
      <div class="media-btn" id="screen-btn" title="Share Screen">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
      </div>
      <input type="text" id="user-input" placeholder="TALK TO ATLAS..." autocomplete="off">
      <div class="mic-toggle" id="mic-btn">
        <svg id="mic-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </div>
    </div>
  </div>

  <div id="video-preview-container">
    <video id="video-preview" autoplay playsinline muted></video>
  </div>

  <video id="capture-video" autoplay playsinline style="display:none"></video>

  <script src="./gemini-client.js"></script>
  <script src="./media-handler.js"></script>
  <script src="./renderer.js"></script>
  <script src="./sphere.js"></script>
</body>

</html>
